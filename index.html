<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f766e">
    <meta name="description" content="組合員向けのURLリンク集アプリです。">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="組合員専用アプリ">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>組合員専用アプリ</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-180.png">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <img class="logo" src="icons/kakilogo.png" alt="愛媛中央花き商業協同組合">
        <h1>組合員専用アプリ</h1>
        <p class="lead">必要な手続きやお知らせをすぐに開けます。</p>
      </header>

      <section class="link-section" aria-label="リンク一覧">
        <div id="link-list" class="link-list" aria-live="polite">
          <p class="loading">リンクを読み込み中です</p>
        </div>
      </section>

      <section id="install-section" class="install-section" aria-label="ホーム画面への追加">
        <button id="install-button" class="install-button" type="button">
          ホーム画面に追加する
        </button>
      </section>

      <footer class="app-footer">
        愛媛中央花き商業協同組合
      </footer>
    </main>

    <dialog id="install-dialog" class="install-dialog" aria-labelledby="install-title">
      <div class="dialog-content">
        <h2 id="install-title">ホーム画面に追加</h2>
        <div id="install-message" class="install-message"></div>
        <button id="close-dialog" class="dialog-close" type="button">閉じる</button>
      </div>
    </dialog>

    <script src="app.js" defer></script>
  </body>
</html>
